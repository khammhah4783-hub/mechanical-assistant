<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دستیار هوشمند مهندسی مکانیک</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #3b82f6;
            --text: #e2e8f0; --border: #334155; --success: #10b981;
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        header { text-align: center; padding: 20px 0; border-bottom: 2px solid var(--accent); margin-bottom: 20px; }
        header h1 { color: var(--accent); }
        .nav-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 5px; margin-bottom: 20px;
        }
        .nav-btn {
            background: var(--card); border: 1px solid var(--border); color: var(--text);
            padding: 8px; border-radius: var(--radius); cursor: pointer; text-align: center; font-size: 0.8em;
            transition: 0.2s;
        }
        .nav-btn.active { background: var(--accent); border-color: var(--accent); }
        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 20px; margin-bottom: 20px; display: none;
        }
        .card.active { display: block; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; color: #94a3b8; font-size: 0.85em; margin-bottom: 3px; }
        .form-group input, .form-group select {
            width: 100%; padding: 8px; background: var(--bg);
            border: 1px solid var(--border); border-radius: 6px; color: var(--text);
        }
        .btn {
            width: 100%; background: var(--accent); color: white; border: none;
            padding: 10px; border-radius: 6px; cursor: pointer; margin-top: 10px;
        }
        .result-box {
            background: #1e293b; border: 1px solid var(--success);
            border-radius: 6px; padding: 15px; margin-top: 10px; display: none;
            white-space: pre-wrap; text-align: left; direction: ltr;
        }
        .result-box.show { display: block; }
        .result-box .value { color: var(--success); font-weight: bold; }
        .solution-box {
            background: #334155; border: 1px solid #f59e0b;
            border-radius: 6px; padding: 15px; margin-top: 10px; display: none;
        }
        .solution-box.show { display: block; }
        .solution-box .title { color: #f59e0b; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; }
        th, td { padding: 8px; border-bottom: 1px solid var(--border); text-align: right; }
        th { background: var(--accent); color: white; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚙️ دستیار هوشمند مهندسی</h1>
            <p style="color:#94a3b8;">AI Control, Refrigeration, Statics, Dynamics & more</p>
        </header>

        <div class="nav-grid">
            <button class="nav-btn active" onclick="switchTab('statics')">استاتیک</button>
            <button class="nav-btn" onclick="switchTab('dynamics')">دینامیک</button>
            <button class="nav-btn" onclick="switchTab('thermo')">ترمودینامیک</button>
            <button class="nav-btn" onclick="switchTab('fluids')">سیالات</button>
            <button class="nav-btn" onclick="switchTab('refrigeration')">❄️ تبرید</button>
            <button class="nav-btn" onclick="switchTab('control')">🎛️ کنترل</button>
            <button class="nav-btn" onclick="switchTab('design')">طراحی</button>
        </div>

        <!-- STATICS -->
        <div id="statics" class="card active">
            <h3>📐 استاتیک</h3>
            <div class="form-row">
                <div class="form-group"><label>نیرو (N)</label><input type="number" id="f_s" value="10000"></div>
                <div class="form-group"><label>سطح مقطع (m²)</label><input type="number" id="a_s" value="0.01"></div>
            </div>
            <button class="btn" onclick="calc('statics')">محاسبه تنش</button>
            <div id="res_s" class="result-box"></div>
        </div>

        <!-- DYNAMICS -->
        <div id="dynamics" class="card">
            <h3>🚀 دینامیک</h3>
            <div class="form-row">
                <div class="form-group"><label>جرم (kg)</label><input type="number" id="m_d" value="10"></div>
                <div class="form-group"><label>ثابت فنر (N/m)</label><input type="number" id="k_d" value="1000"></div>
            </div>
            <button class="btn" onclick="calc('dynamics')">فرکانس طبیعی</button>
            <div id="res_d" class="result-box"></div>
        </div>

        <!-- THERMO -->
        <div id="thermo" class="card">
            <h3>🔥 ترمودینامیک</h3>
            <div class="form-row">
                <div class="form-group"><label>نسبت فشار</label><input type="number" id="rp_t" value="10"></div>
                <div class="form-group"><label>گاما (γ)</label><input type="number" id="gamma_t" value="1.4"></div>
            </div>
            <button class="btn" onclick="calc('thermo')">بازده چرخه</button>
            <div id="res_t" class="result-box"></div>
        </div>

        <!-- FLUIDS -->
        <div id="fluids" class="card">
            <h3>💧 سیالات</h3>
            <div class="form-row">
                <div class="form-group"><label>P1 (Pa)</label><input type="number" id="p1_f" value="101325"></div>
                <div class="form-group"><label>V1 (m/s)</label><input type="number" id="v1_f" value="5"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>V2 (m/s)</label><input type="number" id="v2_f" value="10"></div>
                <div class="form-group"><label>چگالی (kg/m³)</label><input type="number" id="rho_f" value="1000"></div>
            </div>
            <button class="btn" onclick="calc('fluids')">فشار P2</button>
            <div id="res_f" class="result-box"></div>
        </div>

        <!-- REFRIGERATION (AI Expert) -->
        <div id="refrigeration" class="card">
            <h3>❄️ سیستم تبرید و سردخانه (هوشمند)</h3>
            <div class="form-row">
                <div class="form-group"><label>دمای اتاق (C°)</label><input type="number" id="room_temp" value="25"></div>
                <div class="form-group"><label>دمای هدف (C°)</label><input type="number" id="target_temp" value="4"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>حجم اتاق (m³)</label><input type="number" id="room_vol" value="50"></div>
                <div class="form-group"><label>جنس دیوار (عایق)</label>
                    <select id="insulation">
                        <option value="good">پلی‌یورتان (عالی)</option>
                        <option value="medium">پشم سنگ (متوسط)</option>
                        <option value="poor">بدون عایق (ضعیف)</option>
                    </select>
                </div>
            </div>
            <button class="btn" onclick="refrigerationAI()">تحلیل و پیشنهاد سیستم</button>
            <div id="res_r" class="result-box"></div>
            <div id="sol_r" class="solution-box"></div>
        </div>

        <!-- CONTROL (AI Calculation + Explanation) -->
        <div id="control" class="card">
            <h3>🎛️ کنترل اتوماتیک (تحلیل پاسخ پله)</h3>
            <div class="form-row">
                <div class="form-group"><label>نرخ میرایی (ζ)</label><input type="number" id="zeta_c" value="0.5" step="0.1"></div>
                <div class="form-group"><label>فرکانس طبیعی (ωn rad/s)</label><input type="number" id="wn_c" value="10"></div>
            </div>
            <button class="btn" onclick="controlAI()">تحلیل سیستم</button>
            <div id="res_c" class="result-box"></div>
            <div id="sol_c" class="solution-box"></div>
        </div>

        <!-- DESIGN -->
        <div id="design" class="card">
            <h3>🔩 طراحی شفت</h3>
            <div class="form-row">
                <div class="form-group"><label>گشتاور (N.m)</label><input type="number" id="torque_d" value="500"></div>
                <div class="form-group"><label>تنش مجاز (MPa)</label><input type="number" id="tau_d" value="50"></div>
            </div>
            <button class="btn" onclick="calc('design')">قطر شفت</button>
            <div id="res_design" class="result-box"></div>
        </div>
    </div>

    <script>
        // Tab Switching
        function switchTab(id) {
            document.querySelectorAll('.card').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        }

        // Basic Calculators (Math)
        function calc(type) {
            let res;
            if (type === 'statics') {
                const F = parseFloat(document.getElementById('f_s').value);
                const A = parseFloat(document.getElementById('a_s').value);
                const sigma = F / A;
                res = `تنش نرمال: ${(sigma/1e6).toFixed(2)} MPa`;
            } else if (type === 'dynamics') {
                const m = parseFloat(document.getElementById('m_d').value);
                const k = parseFloat(document.getElementById('k_d').value);
                const w = Math.sqrt(k/m);
                res = `فرکانس طبیعی: ${(w/(2*Math.PI)).toFixed(2)} Hz`;
            } else if (type === 'thermo') {
                const rp = parseFloat(document.getElementById('rp_t').value);
                const g = parseFloat(document.getElementById('gamma_t').value);
                const eff = 1 - Math.pow(rp, (1-g)/g);
                res = `بازده چرخه: ${(eff*100).toFixed(2)}%`;
            } else if (type === 'fluids') {
                const p1 = parseFloat(document.getElementById('p1_f').value);
                const v1 = parseFloat(document.getElementById('v1_f').value);
                const v2 = parseFloat(document.getElementById('v2_f').value);
                const rho = parseFloat(document.getElementById('rho_f').value);
                const p2 = p1 + 0.5 * rho * (v1*v1 - v2*v2);
                res = `فشار P2: ${p2.toFixed(2)} Pa`;
            } else if (type === 'design') {
                const T = parseFloat(document.getElementById('torque_d').value);
                const tau = parseFloat(document.getElementById('tau_d').value) * 1e6;
                const d = Math.pow((16*T)/(Math.PI*tau), 1/3);
                res = `قطر شفت: ${(d*1000).toFixed(2)} mm`;
            }
            const el = document.getElementById('res_' + (type==='design'?'design':type[0]));
            el.innerHTML = `<p><span class="value">${res}</span></p>`;
            el.classList.add('show');
        }

        // ================================================================
        // AI EXPERT: REFRIGERATION
        // ================================================================
        function refrigerationAI() {
            const Troom = parseFloat(document.getElementById('room_temp').value);
            const Ttarget = parseFloat(document.getElementById('target_temp').value);
            const Vol = parseFloat(document.getElementById('room_vol').value);
            const Ins = document.getElementById('insulation').value;

            const deltaT = Troom - Ttarget;
            let eff, load, suggestion, comp;

            if(deltaT <= 0) {
                suggestion = "دمای هدف بالاتر از دمای اتاق است. نیازی به سیستم تبرید ندارید.";
                document.getElementById('res_r').innerHTML = `<p>${suggestion}</p>`;
                document.getElementById('res_r').classList.add('show');
                document.getElementById('sol_r').classList.remove('show');
                return;
            }

            // Load Calculation (Approx)
            if(Ins === 'good') eff = 0.9;
            else if(Ins === 'medium') eff = 0.7;
            else eff = 0.5;
            
            load = (Vol * deltaT * 0.3) / eff; // Approx Heat Load in kW

            if(load < 5) comp = "کمپرسور اسکرال ۵ اسب (سرمایش مستقیم)";
            else if(load < 20) comp = "کمپرسور پیستونی ۱۰ اسب (سیستم DX)";
            else comp = "چیلر تراکمی با کندانسور هوایی (۲۰ اسب به بالا)";

            document.getElementById('res_r').innerHTML = `
                <p><span class="value">🔹 بار برودتی تخمینی: ${load.toFixed(1)} kW</span></p>
                <p>ΔT مورد نیاز: ${deltaT}°C | حجم: ${Vol} m³</p>
            `;
            document.getElementById('res_r').classList.add('show');

            document.getElementById('sol_r').innerHTML = `
                <div class="title">📘 راه‌حل پیشنهادی سیستم (تشریحی)</div>
                <p>۱. با توجه به اختلاف دمای ${deltaT} درجه و حجم ${Vol} متر مکعب، بار سرمایشی حدوداً ${load.toFixed(1)} کیلووات برآورد می‌شود.</p>
                <p>۲. برای تأمین این بار برودتی، پیشنهاد می‌شود از یک <b>${comp}</b> استفاده شود.</p>
                <p>۳. جهت توزیع هوا در سردخانه، استفاده از اواپراتور فن‌دار (Evaporator Unit) با ظرفیت حداقل ${load.toFixed(1)} کیلووات الزامی است.</p>
                <p>۴. خط لوله مبرد باید با عایق الاستومری (Armaflex) جهت جلوگیری از تعریق پوشیده شود.</p>
            `;
            document.getElementById('sol_r').classList.add('show');
        }

        // ================================================================
        // AI EXPERT: CONTROL THEORY
        // ================================================================
        function controlAI() {
            const z = parseFloat(document.getElementById('zeta_c').value);
            const w = parseFloat(document.getElementById('wn_c').value);

            let status, tp, ts, os, formula;
            const wd = w * Math.sqrt(1 - z*z);

            if(z < 1) {
                status = "سیستم زیر میرا (Underdamped)";
                os = Math.exp(- (Math.PI * z) / Math.sqrt(1 - z*z));
                tp = Math.PI / wd;
                ts = 4 / (z * w);
                formula = "فرمول زمان اوج: tp = π / ωd";
            } else if(z === 1) {
                status = "سیستم میرا بحرانی (Critically Damped)";
                tp = "بی‌نهایت (بدون نوسان)";
                ts = 5 / (z * w);
                os = 0;
                formula = "سیستم بدون فراجهش است.";
            } else {
                status = "سیستم فوق میرا (Overdamped)";
                tp = "بی‌نهایت";
                ts = 5 / (z * w);
                os = 0;
                formula = "سیستم بسیار کند است.";
            }

            document.getElementById('res_c').innerHTML = `
                <p><span class="value">🔹 وضعیت سیستم: ${status}</span></p>
                <p>ωn: ${w} rad/s | ζ: ${z} | فرکانس میرا: ${wd.toFixed(2)} rad/s</p>
            `;
            document.getElementById('res_c').classList.add('show');

            document.getElementById('sol_c').innerHTML = `
                <div class="title">📘 تحلیل و حل تشریحی (کنترل)</div>
                <p>۱. سیستم دارای تابع تبدیل مرتبه دوم است. معادله مشخصه آن: s² + 2ζωn s + ωn² = 0</p>
                <p>۲. <b>تحلیل پایداری:</b> چون ζ (${z}) و ωn (${w}) مثبت هستند، سیستم پایدار است.</p>
                <p>۳. <b>زمان نشست (Settling Time):</b> به طور تقریبی Ts ≈ ${ts.toFixed(2)} ثانیه است.</p>
                <p>۴. <b>تفسیر فیزیکی:</b> سیستم با میرایی ${z} در ${status} قرار دارد. </p>
                <p>📐 فرمول استفاده شده: ${formula}</p>
            `;
            document.getElementById('sol_c').classList.add('show');
        }
    </script>
</body>
</html>
