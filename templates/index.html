<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mechanical Engineering AI Assistant</title>
    <style>
        :root {
            --bg: #0b1120;
            --card: #1e293b;
            --card-hover: #2d3b52;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.3);
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --radius: 16px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --nav-width: 280px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
            overflow-x: hidden;
        }
        .container { max-width: 900px; margin: 0 auto; }
        
        /* Header */
        header {
            text-align: center;
            padding-bottom: 20px;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border);
        }
        header h1 {
            font-size: 2.2em;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }
        header p { color: var(--text-muted); margin-top: 5px; font-size: 0.95em; }

        /* Hamburger Menu Button (Fixed Top-Left) */
        .menu-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            width: 48px;
            height: 48px;
            border-radius: 12px;
            font-size: 1.5em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
        }
        .menu-toggle:hover { background: var(--card-hover); transform: scale(1.05); }

        /* Sidebar Navigation (Slide-in from Left) */
        .sidebar-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
            display: none;
            backdrop-filter: blur(4px);
        }
        .sidebar-overlay.active { display: block; }
        
        .sidebar {
            position: fixed;
            top: 0; left: -320px;
            width: var(--nav-width);
            height: 100%;
            background: var(--card);
            border-right: 1px solid var(--border);
            z-index: 1001;
            padding: 30px 20px;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
            box-shadow: var(--shadow);
        }
        .sidebar.open { left: 0; }
        .sidebar h2 {
            color: var(--accent);
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
            font-size: 1.2em;
        }
        
        /* Sidebar Navigation Buttons (Icon Only) */
        .nav-btn {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 12px;
            background: transparent;
            border: 1px solid transparent;
            border-radius: var(--radius);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1em;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .nav-btn .icon {
            font-size: 2em;
            width: 40px;
            text-align: center;
        }
        .nav-btn:hover {
            background: var(--card-hover);
            color: var(--text);
            transform: translateX(8px);
        }
        .nav-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .nav-btn .label { font-size: 0.9em; }

        /* Close button inside sidebar */
        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.5em;
            cursor: pointer;
        }
        .close-btn:hover { color: var(--text); }

        /* Main Content Cards (Only one visible at a time) */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 25px;
            margin-bottom: 20px;
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }
        .card.active { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card h3 {
            color: var(--accent);
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            font-size: 1.2em;
        }

        /* Forms */
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; color: var(--text-muted); font-size: 0.85em; margin-bottom: 5px; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 1em;
            transition: all 0.3s ease;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        /* Action Buttons */
        .btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.2);
        }
        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 30px rgba(59, 130, 246, 0.4);
        }
        .btn:active { transform: scale(0.95); }

        /* Loading Gear */
        .loading-overlay {
            display: none;
            justify-content: center;
            align-items: center;
            padding: 30px 0;
            margin-top: 10px;
        }
        .loading-overlay.active { display: flex; }
        .gear {
            width: 60px; height: 60px;
            border: 8px solid var(--border);
            border-top: 8px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            position: relative;
        }
        .gear::before, .gear::after {
            content: ''; position: absolute;
            background: var(--bg);
        }
        .gear::before {
            width: 24px; height: 24px;
            top: 18px; left: 18px;
            border-radius: 50%;
            background: var(--card);
            border: 4px solid var(--border);
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Results */
        .result-box {
            background: var(--bg);
            border: 1px solid var(--success);
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .result-box.show { display: block; }
        .result-box .value { color: var(--success); font-weight: bold; font-size: 1.1em; }
        .solution-box {
            background: #1a1a2e;
            border: 1px solid #f59e0b;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            display: none;
        }
        .solution-box.show { display: block; }
        .solution-box .title { color: #f59e0b; font-weight: bold; font-size: 1.1em; margin-bottom: 10px; }

        /* Adjust content padding to account for fixed menu button */
        @media (max-width: 600px) {
            body { padding-top: 80px; }
            .form-row { grid-template-columns: 1fr; }
            header h1 { font-size: 1.8em; }
            .sidebar { width: 260px; left: -280px; }
        }
    </style>
</head>
<body>
    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- Hamburger Button (Top-Left Fixed) -->
    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <button class="close-btn" onclick="closeSidebar()">✕</button>
        <h2>⚙️ Menu</h2>
        
        <button class="nav-btn active" onclick="switchTab('statics')">
            <span class="icon">📐</span><span class="label">Statics</span>
        </button>
        <button class="nav-btn" onclick="switchTab('dynamics')">
            <span class="icon">🚀</span><span class="label">Dynamics</span>
        </button>
        <button class="nav-btn" onclick="switchTab('thermo')">
            <span class="icon">🔥</span><span class="label">Thermodynamics</span>
        </button>
        <button class="nav-btn" onclick="switchTab('fluids')">
            <span class="icon">💧</span><span class="label">Fluids</span>
        </button>
        <button class="nav-btn" onclick="switchTab('refrigeration')">
            <span class="icon">❄️</span><span class="label">Refrigeration</span>
        </button>
        <button class="nav-btn" onclick="switchTab('control')">
            <span class="icon">🎛️</span><span class="label">Control</span>
        </button>
        <button class="nav-btn" onclick="switchTab('design')">
            <span class="icon">🔩</span><span class="label">Design</span>
        </button>
    </div>

    <div class="container">
        <header>
            <h1>⚙️ Mechanical AI</h1>
            <p>Engineering Calculator · Expert System · AI Analysis</p>
        </header>

        <!-- STATICS -->
        <div id="statics" class="card active">
            <h3>📐 Statics & Strength</h3>
            <div class="form-row">
                <div class="form-group"><label>Force (N)</label><input type="number" id="f_s" value="10000"></div>
                <div class="form-group"><label>Area (m²)</label><input type="number" id="a_s" value="0.01"></div>
            </div>
            <button class="btn" onclick="calc('statics')">Calculate Stress</button>
            <div class="loading-overlay" id="load_s"><div class="gear"></div></div>
            <div id="res_s" class="result-box"></div>
        </div>

        <!-- DYNAMICS -->
        <div id="dynamics" class="card">
            <h3>🚀 Dynamics & Vibration</h3>
            <div class="form-row">
                <div class="form-group"><label>Mass (kg)</label><input type="number" id="m_d" value="10"></div>
                <div class="form-group"><label>Spring Constant (N/m)</label><input type="number" id="k_d" value="1000"></div>
            </div>
            <button class="btn" onclick="calc('dynamics')">Natural Frequency</button>
            <div class="loading-overlay" id="load_d"><div class="gear"></div></div>
            <div id="res_d" class="result-box"></div>
        </div>

        <!-- THERMO -->
        <div id="thermo" class="card">
            <h3>🔥 Thermodynamics</h3>
            <div class="form-row">
                <div class="form-group"><label>Pressure Ratio</label><input type="number" id="rp_t" value="10"></div>
                <div class="form-group"><label>Gamma (γ)</label><input type="number" id="gamma_t" value="1.4"></div>
            </div>
            <button class="btn" onclick="calc('thermo')">Cycle Efficiency</button>
            <div class="loading-overlay" id="load_t"><div class="gear"></div></div>
            <div id="res_t" class="result-box"></div>
        </div>

        <!-- FLUIDS -->
        <div id="fluids" class="card">
            <h3>💧 Fluid Mechanics</h3>
            <div class="form-row">
                <div class="form-group"><label>P1 (Pa)</label><input type="number" id="p1_f" value="101325"></div>
                <div class="form-group"><label>V1 (m/s)</label><input type="number" id="v1_f" value="5"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>V2 (m/s)</label><input type="number" id="v2_f" value="10"></div>
                <div class="form-group"><label>Density (kg/m³)</label><input type="number" id="rho_f" value="1000"></div>
            </div>
            <button class="btn" onclick="calc('fluids')">Calculate P2</button>
            <div class="loading-overlay" id="load_f"><div class="gear"></div></div>
            <div id="res_f" class="result-box"></div>
        </div>

        <!-- REFRIGERATION -->
        <div id="refrigeration" class="card">
            <h3>❄️ Refrigeration & Cold Storage</h3>
            <div class="form-row">
                <div class="form-group"><label>Room Temp (°C)</label><input type="number" id="room_temp" value="25"></div>
                <div class="form-group"><label>Target Temp (°C)</label><input type="number" id="target_temp" value="4"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Room Volume (m³)</label><input type="number" id="room_vol" value="50"></div>
                <div class="form-group"><label>Insulation Type</label>
                    <select id="insulation">
                        <option value="good">Polyurethane (Excellent)</option>
                        <option value="medium">Rock Wool (Average)</option>
                        <option value="poor">No Insulation (Poor)</option>
                    </select>
                </div>
            </div>
            <button class="btn" onclick="refrigerationAI()">Analyze & Suggest</button>
            <div class="loading-overlay" id="load_r"><div class="gear"></div></div>
            <div id="res_r" class="result-box"></div>
            <div id="sol_r" class="solution-box"></div>
        </div>

        <!-- CONTROL -->
        <div id="control" class="card">
            <h3>🎛️ Automatic Control</h3>
            <div class="form-row">
                <div class="form-group"><label>Damping Ratio (ζ)</label><input type="number" id="zeta_c" value="0.5" step="0.1"></div>
                <div class="form-group"><label>Natural Freq (ωn)</label><input type="number" id="wn_c" value="10"></div>
            </div>
            <button class="btn" onclick="controlAI()">Analyze System</button>
            <div class="loading-overlay" id="load_c"><div class="gear"></div></div>
            <div id="res_c" class="result-box"></div>
            <div id="sol_c" class="solution-box"></div>
        </div>

        <!-- DESIGN -->
        <div id="design" class="card">
            <h3>🔩 Machine Design</h3>
            <div class="form-row">
                <div class="form-group"><label>Torque (N.m)</label><input type="number" id="torque_d" value="500"></div>
                <div class="form-group"><label>Allowable Shear (MPa)</label><input type="number" id="tau_d" value="50"></div>
            </div>
            <button class="btn" onclick="calc('design')">Shaft Diameter</button>
            <div class="loading-overlay" id="load_ds"><div class="gear"></div></div>
            <div id="res_design" class="result-box"></div>
        </div>
    </div>

    <script>
        // Sidebar Toggle Functions
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        }
        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('active');
        }

        // Tab Switching with Sidebar Close
        function switchTab(id) {
            document.querySelectorAll('.card').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
            closeSidebar(); // Auto-close menu on selection
        }

        // Simulate Loading Gear + Calculation
        function runCalc(loaderId, resultId, calculationFunction) {
            document.getElementById(loaderId).classList.add('active');
            document.getElementById(resultId).classList.remove('show');
            setTimeout(() => {
                document.getElementById(loaderId).classList.remove('active');
                calculationFunction();
            }, 1500);
        }

        // Basic Calculators
        function calc(type) {
            const loadMap = {'statics':'load_s','dynamics':'load_d','thermo':'load_t','fluids':'load_f','design':'load_ds'};
            const resMap = {'statics':'res_s','dynamics':'res_d','thermo':'res_t','fluids':'res_f','design':'res_design'};
            runCalc(loadMap[type], resMap[type], function() {
                let res;
                if (type === 'statics') {
                    const F = parseFloat(document.getElementById('f_s').value);
                    const A = parseFloat(document.getElementById('a_s').value);
                    const sigma = F / A;
                    res = `Normal Stress: <span class="value">${(sigma/1e6).toFixed(2)} MPa</span>`;
                } else if (type === 'dynamics') {
                    const m = parseFloat(document.getElementById('m_d').value);
                    const k = parseFloat(document.getElementById('k_d').value);
                    const w = Math.sqrt(k/m);
                    res = `Natural Frequency: <span class="value">${(w/(2*Math.PI)).toFixed(2)} Hz</span>`;
                } else if (type === 'thermo') {
                    const rp = parseFloat(document.getElementById('rp_t').value);
                    const g = parseFloat(document.getElementById('gamma_t').value);
                    const eff = 1 - Math.pow(rp, (1-g)/g);
                    res = `Cycle Efficiency: <span class="value">${(eff*100).toFixed(2)}%</span>`;
                } else if (type === 'fluids') {
                    const p1 = parseFloat(document.getElementById('p1_f').value);
                    const v1 = parseFloat(document.getElementById('v1_f').value);
                    const v2 = parseFloat(document.getElementById('v2_f').value);
                    const rho = parseFloat(document.getElementById('rho_f').value);
                    const p2 = p1 + 0.5 * rho * (v1*v1 - v2*v2);
                    res = `Pressure P2: <span class="value">${p2.toFixed(2)} Pa</span>`;
                } else if (type === 'design') {
                    const T = parseFloat(document.getElementById('torque_d').value);
                    const tau = parseFloat(document.getElementById('tau_d').value) * 1e6;
                    const d = Math.pow((16*T)/(Math.PI*tau), 1/3);
                    res = `Shaft Diameter: <span class="value">${(d*1000).toFixed(2)} mm</span>`;
                }
                const el = document.getElementById(resMap[type]);
                el.innerHTML = `<p>${res}</p>`;
                el.classList.add('show');
            });
        }

        // Refrigeration AI
        function refrigerationAI() {
            runCalc('load_r', 'res_r', function() {
                const Troom = parseFloat(document.getElementById('room_temp').value);
                const Ttarget = parseFloat(document.getElementById('target_temp').value);
                const Vol = parseFloat(document.getElementById('room_vol').value);
                const Ins = document.getElementById('insulation').value;
                const deltaT = Troom - Ttarget;
                let eff, load, comp;
                if(deltaT <= 0) {
                    document.getElementById('res_r').innerHTML = `<p>Target temp is higher than room. No cooling needed.</p>`;
                    document.getElementById('res_r').classList.add('show');
                    document.getElementById('sol_r').classList.remove('show');
                    return;
                }
                if(Ins === 'good') eff = 0.9;
                else if(Ins === 'medium') eff = 0.7;
                else eff = 0.5;
                load = (Vol * deltaT * 0.3) / eff;
                if(load < 5) comp = "5 HP Scroll Compressor";
                else if(load < 20) comp = "10 HP Reciprocating Compressor";
                else comp = "Air-Cooled Chiller (20 HP+)";

                document.getElementById('res_r').innerHTML = `
                    <p><span class="value">Cooling Load: ${load.toFixed(1)} kW</span></p>
                    <p>ΔT: ${deltaT}°C | Volume: ${Vol} m³</p>
                `;
                document.getElementById('res_r').classList.add('show');
                document.getElementById('sol_r').innerHTML = `
                    <div class="title">📘 Suggested Solution</div>
                    <p>1. Estimated cooling load is approx. ${load.toFixed(1)} kW.</p>
                    <p>2. Suggestion: Use a <b>${comp}</b> system.</p>
                    <p>3. Air distribution should use a fan-coil evaporator with ${load.toFixed(1)} kW capacity.</p>
                `;
                document.getElementById('sol_r').classList.add('show');
            });
        }

        // Control AI
        function controlAI() {
            runCalc('load_c', 'res_c', function() {
                const z = parseFloat(document.getElementById('zeta_c').value);
                const w = parseFloat(document.getElementById('wn_c').value);
                const wd = w * Math.sqrt(1 - z*z);
                let status, tp, ts, os, formula;
                if(z < 1) {
                    status = "Underdamped";
                    os = Math.exp(- (Math.PI * z) / Math.sqrt(1 - z*z));
                    tp = Math.PI / wd;
                    ts = 4 / (z * w);
                    formula = "tp = π / ωd";
                } else if(z === 1) {
                    status = "Critically Damped";
                    tp = "No overshoot";
                    ts = 5 / (z * w);
                    os = 0;
                    formula = "No overshoot";
                } else {
                    status = "Overdamped";
                    tp = "Infinite";
                    ts = 5 / (z * w);
                    os = 0;
                    formula = "Slow system";
                }
                document.getElementById('res_c').innerHTML = `
                    <p><span class="value">System Status: ${status}</span></p>
                    <p>ωn: ${w} rad/s | ζ: ${z} | Damped Freq: ${wd.toFixed(2)} rad/s</p>
                `;
                document.getElementById('res_c').classList.add('show');
                document.getElementById('sol_c').innerHTML = `
                    <div class="title">📘 Control Analysis</div>
                    <p>1. Characteristic Equation: s² + 2ζωn s + ωn² = 0</p>
                    <p>2. System is stable (ζ and ωn are positive).</p>
                    <p>3. Settling Time: Ts ≈ ${ts.toFixed(2)} seconds.</p>
                    <p>4. Formula: ${formula}</p>
                `;
                document.getElementById('sol_c').classList.add('show');
            });
        }
    </script>
</body>
</html>
